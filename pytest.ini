[pytest]
# Make `src` importable without installing the project (pytest >= 7).
pythonpath = .
testpaths = tests
addopts = -ra -q
markers =
    slow: end-to-end tests that build/train models (need torch); deselect with -m "not slow"
    needs_torch: test requires PyTorch
    needs_sklearn: test requires scikit-learn
    needs_albumentations: test requires albumentations
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
